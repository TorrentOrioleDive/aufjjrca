[settings]
# Имена клиентов — секции [client/<name>] ниже
clients = bot_a bot_b
debug = False

# Узкие критерии поиска. Передаются в scan-for-peer.searchCriteria.
# Оставь как есть для дефолта или меняй под себя.
# my-sex / wish-sex: M (мужской) / F (женский) / пусто (любой)
# my-age / wish-age: диапазоны вида 18,21 или несколько через "-" : 0,17-18,21
[client/bot_a]
token =
ua    = Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36
my-sex   = M
my-age   = 18,21
wish-sex = F
wish-age = 18,21

[client/bot_b]
token =
ua    = Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36
my-sex   = F
my-age   = 18,21
wish-sex = M
wish-age = 18,21
